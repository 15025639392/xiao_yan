name: File Budgets

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - codex/**

jobs:
  check-file-budgets:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Collect changed files
        id: changed-files
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch --no-tags --prune --depth=1 origin "${{ github.base_ref }}"
            changed_files="$(git diff --name-only "origin/${{ github.base_ref }}"...HEAD -- '*.py' '*.ts' '*.tsx' '*.js' '*.jsx' || true)"
          else
            changed_files="$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" -- '*.py' '*.ts' '*.tsx' '*.js' '*.jsx' || true)"
          fi

          {
            echo 'files<<EOF'
            echo "${changed_files}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Run file budget checks
        shell: bash
        run: |
          if [[ -z "${{ steps.changed-files.outputs.files }}" ]]; then
            echo "No source file changes to check."
            exit 0
          fi

          mapfile -t changed_files < <(printf '%s\n' "${{ steps.changed-files.outputs.files }}")
          python3 tools/check_file_budgets.py "${changed_files[@]}"
