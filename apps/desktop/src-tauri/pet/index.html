<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INTP 小紫人</title>
<script src="avatar_data.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }

  body {
    background: #1a1625;
    user-select: none;
    -webkit-user-select: none;
    cursor: grab;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  body:active { cursor: grabbing; }

  /* ===== Pet Container ===== */
  .pet {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ===== Avatar ===== */
  .pet__avatar {
    position: relative;
    width: min(78vw, 220px);
    height: auto;
    aspect-ratio: 0.94;
    animation: breathe 3s ease-in-out infinite;
    filter: drop-shadow(0 6px 24px rgba(124,58,237,0.35));
    transition: filter 0.4s ease, transform 0.2s ease;
    border-radius: 20px;
    overflow: hidden;
    background: #1a1625;
  }

  .pet__avatar:hover {
    filter: drop-shadow(0 8px 36px rgba(124,58,237,0.5));
  }

  .pet__avatar img { width: 100%; height: 100%; display: block; pointer-events: none; object-fit: cover; }

  .pet__avatar--bounce { animation: bounce 0.45s cubic-bezier(.34,1.56,.64,1); }

  @keyframes breathe {
    0%, 100% { transform: scale(1) translateY(0); }
    50%      { transform: scale(1.03) translateY(-4px); }
  }
  @keyframes bounce {
    0%   { transform: scale(1); }
    30%  { transform: scale(0.88); }
    60%  { transform: scale(1.06); }
    100% { transform: scale(1); }
  }

  /* ===== Blink overlay ===== */
  .pet__blink {
    position: absolute; top: 26%; left: 18%;
    width: 64%; height: 13%;
    z-index: 5; pointer-events: none;
    border-radius: 50%;
    background: transparent;
    transition: background 0.06s linear;
  }
  .pet__blink.active { background: #fde8e8; }

  /* ===== Status text ===== */
  .pet__status {
    position: absolute; bottom: 10px;
    left: 50%; transform: translateX(-50%);
    padding: 3px 14px;
    font-size: 11px; color: #c4b5fd;
    background: rgba(167,139,250,0.08);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(167,139,250,0.15);
    border-radius: 20px; white-space: nowrap;
    opacity: 0.65;
    transition: opacity 0.4s;
  }
  .pet__status--visible { opacity: 1; animation: pulse-text 4s ease-in-out infinite; }

  @keyframes pulse-text {
    0%, 16%, 84%, 100% { opacity: 0.55; }
    42%, 62%           { opacity: 1;   }
  }

  /* ===== Bubble ===== */
  .pet__bubble {
    position: absolute;
    top: -72px; left: 50%; transform: translateX(-50%) scale(0.7) translateY(12px);
    background: #fff; color: #333;
    padding: 10px 18px;
    border-radius: 18px;
    font-size: 13px; line-height: 1.55;
    max-width: 230px; min-width: 120px;
    text-align: center;
    box-shadow: 0 6px 28px rgba(0,0,0,0.14);
    opacity: 0; visibility: hidden;
    transition: all 0.32s cubic-bezier(.22,1,.36,1);
    z-index: 20;
  }
  .pet__bubble::after {
    content: ''; position: absolute;
    bottom: -9px; left: 50%;
    margin-left: -9px;
    border-left: 9px solid transparent;
    border-right: 9px solid transparent;
    border-top: 9px solid #fff;
  }
  .pet__bubble.show {
    opacity: 1; visibility: visible;
    transform: translateX(-50%) scale(1) translateY(0);
  }

  /* ===== Context Menu ===== */
  .pet__menu {
    position: absolute;
    bottom: 0; right: 0;
    transform-origin: bottom right;
    background: rgba(30,27,40,0.94);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 14px;
    padding: 5px 0;
    min-width: 160px;
    box-shadow: 0 10px 38px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
    opacity: 0; visibility: hidden;
    transition: all 0.18s ease;
    z-index: 50;
  }
  .pet__menu.open { opacity: 1; visibility: visible; }

  .pet__menu-item {
    padding: 9px 18px; font-size: 13px; color: #d8cee8;
    cursor: pointer; display: flex; gap: 10px; align-items: center;
    transition: all 0.12s;
  }
  .pet__menu-item:hover { background: rgba(167,139,250,0.2); color: #fff; }

  .pet__menu-sep { height: 1px; background: rgba(255,255,255,0.06); margin: 4px 0; }

  /* ===== Particles ===== */
  .pet__particle {
    position: absolute; border-radius: 50%; pointer-events: none;
    opacity: 0; animation: particle-float 2s ease-out forwards;
  }
  @keyframes particle-float {
    0%   { opacity: 0.85; transform: translateY(0) scale(1); }
    100% { opacity: 0;     transform: translateY(-90px) scale(0.25); }
  }
</style>
</head>

<body>
<div class="pet" id="petEl">
  <div class="pet__bubble" id="bubbleEl"></div>

  <div class="pet__avatar" id="avatarEl">
    <img id="imgEl" alt="INTP 小紫人"/>
    <div class="pet__blink" id="blinkEl"></div>
  </div>

  <div class="pet__status pet__status--visible" id="statusEl">正在思考...</div>

  <nav class="pet__menu" id="menuEl" role="menu">
    <div class="pet__menu-item" data-action="chat" role="menuitem">💬 和我说话</div>
    <div class="pet__menu-item" data-action="main" role="menuitem">🏠 打开主界面</div>
    <div class="pet__menu-sep"/>
    <div class="pet__menu-item" data-action="top" role="menuitem">📌 切换置顶</div>
    <div class="pet__menu-item" data-action="size" role="menuitem">🔍 切换大小</div>
    <div class="pet__menu-sep"/>
    <div class="pet__menu-item" data-action="hide" role="menuitem">✨ 隐藏</div>
  </nav>
</div>

<script type="module">
import { AVATAR_DATA_URI } from './avatar_data.js';

/* ---- DOM refs ---- */
const img = document.getElementById('imgEl');
const avatar = document.getElementById('avatarEl');
const blink = document.getElementById('blinkEl');
const status = document.getElementById('statusEl');
const bubble = document.getElementById('bubbleEl');
const menu = document.getElementById('menuEl');
const pet = document.getElementById('petEl');

/* ---- Load avatar ---- */
img.src = AVATAR_DATA_URI;

/* ---- State ---- */
let dragging = false, dragStart = null;
let sizeMode = 'normal';
let bubbleTimer;

/* ---- Phrases ---- */
const PHRASES = [
  "在想有趣的事情...", "今天天气不错呢", "要不要聊聊天？",
  "我在观察这个世界~", "嗯...这个想法不错", "你今天过得好吗？",
  "让我想想...", "有点困了...", "在思考人生的意义",
  "想听个冷笑话吗？", "代码写好了吗？", "我在这里陪你呀",
];

/* ---- Init ---- */
function init() { idleLoop(); drag(); click(); contextMenu(); tauriBridge(); }

/* ---- Idle animations ---- */
function idleLoop() {
  // Blink schedule
  function nextBlink() {
    const delay = 2600 + Math.random() * 4200;
    setTimeout(() => { doBlink(); nextBlink(); }, delay);
  }
  nextBlink();

  // Rotating status
  function nextStatus() {
    const p = PHRASES[Math.random() * PHRASES.length | 0];
    status.textContent = p;
  }
  nextStatus();
  setInterval(nextStatus, 5500 + Math.random() * 4500);
}

function doBlink() {
  blink.classList.add('active');
  setTimeout(() => blink.classList.remove('active'), 110);
}

/* ---- Drag ---- */
function drag() {
  pet.addEventListener('mousedown', e => {
    if (e.target.closest('.pet__menu') || e.button !== 0) return;
    dragging = true;
    dragStart = e;
    e.preventDefault();
  });
  document.addEventListener('mousemove', async e => {
    if (!dragging || !dragStart) return;
    const dx = e.clientX - dragStart.clientX, dy = e.clientY - dragStart.clientY;
    dragStart = e;
    try {
      const { getCurrentWindow } = await import('@tauri-apps/api/window');
      const w = getCurrentWindow(), pos = await w.outerPosition();
      await w.setPosition({ x: pos.x + dx, y: pos.y + dy });
    } catch {}
  });
  document.addEventListener('mouseup', () => { dragging = false; dragStart = null; });
}

/* ---- Click ---- */
function click() {
  let lastT = 0;
  avatar.addEventListener('click', e => {
    e.stopPropagation();
    const now = Date.now();
    if (now - lastT < 320) {
      showBubble(PHRASES[Math.random() * PHRASES.length | 0]);
      particles(e.offsetX, e.offsetY);
    } else {
      avatar.classList.add('pet__avatar--bounce');
      setTimeout(() => avatar.classList.remove('pet__avatar--bounce'), 450);
    }
    lastT = now;
  });
}

function showBubble(text) {
  bubble.textContent = text;
  bubble.classList.add('show');
  clearTimeout(bubbleTimer);
  bubbleTimer = setTimeout(() => bubble.classList.remove('show'), 3000);
}

function particles(x, y) {
  const colors = ['#A78BFA','#C4B5FD','#DDD6FE','#FDE68A','#FBCFE8'];
  for (let i = 0; i < 7; i++) {
    const d = document.createElement('div');
    d.className = 'pet__particle';
    const s = 4 + Math.random() * 8;
    Object.assign(d.style, { width:s+'px',height:s+'px',
      background:colors[Math.random()*colors.length|0],
      left:x+(Math.random()-0.5)*44+'px',top:y+(Math.random()-0.5)*44+'px' });
    pet.appendChild(d);
    setTimeout(()=>d.remove(),2100);
  }
}

/* ---- Context menu ---- */
function contextMenu() {
  menu.addEventListener('click', async e => {
    const item = e.target.closest('.pet__menu-item');
    if (!item) return;
    closeMenu();
    const action = item.dataset.action;
    try {
      const { getCurrentWindow } = await import('@tauri-apps/api/window');
      const win = getCurrentWindow();
      switch (action) {
        case 'chat': showBubble("去主界面找我聊天吧～"); break;
        case 'main': {
          const { WebviewWindow } = await import('@tauri-apps/api/webviewWindow');
          try { const mw = await WebviewWindow.getByLabel('main'); if(mw){await mw.show();await mw.setFocus();} } catch{}
          break;
        }
        case 'top': await win.setAlwaysOnTop(!await win.isAlwaysOnTop()); break;
        case 'size': {
          sizeMode = sizeMode === 'normal' ? 'large' : 'normal';
          const sz = sizeMode === 'large' ? {w:380,h:480} : {w:280,h:380};
          await win.setSize(sz);
          break;
        }
        case 'hide': await win.hide(); break;
      }
    } catch(err){ console.error('[Pet]', err); }
  });

  pet.addEventListener('contextmenu', e => { e.preventDefault(); openMenu(); });
  document.addEventListener('mousedown', e => { if(!e.target.closest('.pet__menu')) closeMenu(); });
}
function openMenu(){ menu.classList.add('open'); }
function closeMenu(){ menu.classList.remove('open'); }

/* ---- Tauri bridge ---- */
async function tauriBridge() {
  try {
    const { listen } = await import('@tauri-apps/api/event');
    await listen('pet-message', ev => {
      if(ev.payload?.text) showBubble(ev.payload.text);
      if(ev.payload?.action==='blink') doBlink();
    });
  } catch {}
}

/* Go */
init();
</script>
</body>
</html>
